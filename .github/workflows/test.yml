# Generated by Workflow Builder (https://githubworkflow.com)
# Updated to add a manual approval gate using GitHub Environments

name: Test Workflow

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: staging
        type: choice
        options:
          - development
          - staging
          - production
      JIRA:
        description: JIRA ref
        type: string

jobs:
  approval_gate:
    name: Manual Approval
    runs-on: ubuntu-latest
    
    permissions:
      issues: write

    steps:
      - name: Await Manual Approval
        uses: trstringer/manual-approval@v1
        with:
          secret: ${{ github.TOKEN }}
          approvers: martinward
          minimum-approvals: 1
          issue-title: "Manual Approval Required for Terraform Apply"
          issue-body: "Please approve or deny the deployment."
          
  build:
    runs-on: ubuntu-latest
    needs: approval_gate
    steps:
      - name: Run a one-line script
        run: echo "Hello, everyone!"
        
