# Generated by Workflow Builder (https://githubworkflow.com)
# Updated to add a manual approval gate using GitHub Environments

name: Test Workflow

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: staging
        type: choice
        options:
          - development
          - staging
          - production

jobs:
  issue_approval:
    name: Request approval via GitHub Issue (${{ inputs.environment }})
    runs-on: ubuntu-latest
    steps:
      - name: Create approval request (Issue)
        uses: trstringer/manual-approval@v1
        with:
          secret: ${{ github.TOKEN }}
          approvers: martinward
          minimum-approvals: 1
          issue-title: "Approval required: Test Workflow → ${{ inputs.environment }}"
          issue-body: |
            Please approve this workflow run.

            Environment: ${{ inputs.environment }}
            Repository:  ${{ github.repository }}
            Branch/Ref:  ${{ github.ref }}
            Commit SHA:  ${{ github.sha }}
            Triggered by: ${{ github.actor }}

            Approve by commenting: approve / approved / lgtm
            Deny by commenting: deny / denied / no
  approval_gate:
    name: Manual approval (${{ inputs.environment }})
    runs-on: ubuntu-latest
    environment:
      name: ${{ inputs.environment }}
    steps:
      - name: Gate reached
        run: echo "Waiting for approval"

  build:
    runs-on: ubuntu-latest
    needs: approval_gate
    steps:
      - name: Run a one-line script
        run: echo "Hello, everyone!"
