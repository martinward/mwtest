# Generated by Workflow Builder (https://githubworkflow.com)
# Updated to add a manual approval gate using GitHub Environments

name: Test Workflow

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: staging
        type: choice
        options:
          - development
          - staging
          - production
      JIRA:
        description: JIRA ref
        type: string

jobs:
  approval_gate:
    name: Manual approval (${{ inputs.environment }} ${{ inputs.JIRA }} )
    runs-on: ubuntu-latest
    environment:
      name: ${{ inputs.environment }}
    steps:
      - name: Gate reached
        run: echo "Waiting for approval"

  build:
    runs-on: ubuntu-latest
    needs: approval_gate
    steps:
      - name: Run a one-line script
        run: echo "Hello, everyone!"
        
  notify_teams:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Notify Teams
        uses: nhs-england-tools/notify-msteams-action@v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          teams-webhook-url: ${{ secrets.TEAMS_WEBHOOK_URL }}
          message-title: "Test"
          message-text: "Test"
          link: "test"

