# Generated by Workflow Builder (https://githubworkflow.com)
# Updated to add a manual approval gate using GitHub Environments

name: Test Workflow

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: staging
        type: choice
        options:
          - development
          - staging
          - production

jobs:
  issue_approval:
    name: Request approval via GitHub Issue (${{ inputs.environment }})
    runs-on: ubuntu-latest
    steps:
      - name: Notify via GitHub comment
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = context.issue.number; // works on issue/pr events
            await github.rest.issues.createComment({
              owner, repo, issue_number,
              body: `Hi @martinward — please review this run: ${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`
            });
  approval_gate:
    name: Manual approval (${{ inputs.environment }})
    runs-on: ubuntu-latest
    environment:
      name: ${{ inputs.environment }}
    steps:
      - name: Gate reached
        run: echo "Waiting for approval"

  build:
    runs-on: ubuntu-latest
    needs: approval_gate
    steps:
      - name: Run a one-line script
        run: echo "Hello, everyone!"
